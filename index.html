<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Matematika Aldi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Efek animasi sederhana saat menjawab */
        .flash-correct {
            animation: bgCorrect 0.5s ease-out;
        }
        .flash-wrong {
            animation: bgWrong 0.5s ease-out;
        }
        
        @keyframes bgCorrect {
            0% { background-color: #dcfce7; transform: scale(1.02); }
            100% { background-color: #ffffff; transform: scale(1); }
        }
        @keyframes bgWrong {
            0% { background-color: #fee2e2; transform: scale(0.98); }
            100% { background-color: #ffffff; transform: scale(1); }
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col font-sans text-slate-800">

    <main class="flex-grow flex items-center justify-center p-4">
        <div id="game-board" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md text-center transition-all">
            
            <div class="flex justify-between items-center mb-8 border-b pb-4">
                <div class="text-lg font-bold">
                    Skor: <span id="score-display" class="text-blue-600 text-2xl">0</span>
                </div>
                <div class="text-lg font-bold flex items-center bg-slate-100 px-3 py-1 rounded-lg">
                    ⏱️ <span id="timer-display" class="text-red-500 text-2xl ml-2 w-8 text-right">10</span>s
                </div>
            </div>

            <div class="mb-8">
                <p class="text-sm text-slate-500 uppercase tracking-widest font-semibold mb-2">Berapa Hasil Dari?</p>
                <h2 id="question-display" class="text-5xl font-extrabold text-slate-700 tracking-wider">
                    </h2>
            </div>

            <div id="options-container" class="space-y-3 mb-4">
                </div>

            <div id="feedback-msg" class="h-6 font-bold text-lg rounded"></div>
            
        </div>
    </main>

    <footer class="bg-slate-800 text-slate-300 text-center py-4 text-sm tracking-wide">
        Game dirancang oleh <span class="text-white font-bold">Aldi</span>
    </footer>

    <script>
        // Variabel Game
        let score = 0;
        let timeLeft = 10;
        let timerInterval;
        let correctAnswer;
        let isProcessing = false; // Mencegah double click

        // Referensi Elemen DOM
        const scoreEl = document.getElementById('score-display');
        const timerEl = document.getElementById('timer-display');
        const questionEl = document.getElementById('question-display');
        const optionsContainer = document.getElementById('options-container');
        const feedbackEl = document.getElementById('feedback-msg');
        const gameBoard = document.getElementById('game-board');

        // Fungsi Helper: Mendapatkan angka random dalam rentang tertentu
        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        // Memulai dan Mengatur Timer
        function startTimer() {
            timeLeft = 10;
            timerEl.textContent = timeLeft;
            timerEl.classList.remove('text-red-500');
            timerEl.classList.add('text-slate-700');
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.textContent = timeLeft;
                
                if (timeLeft <= 3) {
                    timerEl.classList.add('text-red-500'); // Peringatan waktu mau habis
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    handleAnswer(null); // Null berarti timeout (tidak menjawab)
                }
            }, 1000);
        }

        // Membuat Soal Baru
        function generateQuestion() {
            isProcessing = false;
            feedbackEl.textContent = '';
            gameBoard.classList.remove('flash-correct', 'flash-wrong');

            const operators = ['+', '-', '*', '/'];
            const op = operators[getRandomInt(0, 3)];
            let num1, num2;

            // Logika Pembuatan Angka sesuai Operator (Maksimal 2 digit: 0-99)
            switch (op) {
                case '+':
                    num1 = getRandomInt(0, 99);
                    num2 = getRandomInt(0, 99);
                    correctAnswer = num1 + num2;
                    break;
                case '-':
                    num1 = getRandomInt(0, 99);
                    num2 = getRandomInt(0, 99);
                    // Mencegah hasil negatif agar lebih ramah untuk game dasar (opsional)
                    if (num1 < num2) [num1, num2] = [num2, num1];
                    correctAnswer = num1 - num2;
                    break;
                case '*':
                    num1 = getRandomInt(0, 99);
                    // Agar tidak terlalu ekstrem untuk dikali di kepala, pengali kedua sedikit dibatasi, 
                    // tapi jika ingin tetap murni 0-99 bisa pakai getRandomInt(0, 99)
                    num2 = getRandomInt(0, 15); 
                    correctAnswer = num1 * num2;
                    break;
                case '/':
                    // Untuk pembagian bulat: tentukan hasil dan pembagi dulu, lalu cari angka yang dibagi
                    num2 = getRandomInt(1, 99); // Pembagi (tidak boleh 0)
                    const maxResult = Math.floor(99 / num2); // Memastikan angka pertama maksimal 99
                    correctAnswer = getRandomInt(0, maxResult);
                    num1 = num2 * correctAnswer; // Angka yang dibagi pasti bulat dan <= 99
                    break;
            }

            // Tampilkan Soal
            let displayOp = op;
            if (op === '*') displayOp = '×';
            if (op === '/') displayOp = '÷';
            questionEl.textContent = `${num1} ${displayOp} ${num2}`;

            // Buat Pilihan Jawaban
            let options = [correctAnswer];
            
            // Generate 2 jawaban salah yang "masuk akal" (dekat dengan jawaban benar)
            while (options.length < 3) {
                let offset = getRandomInt(-12, 12);
                if (offset === 0) offset = 5; // Jangan sampai sama dengan jawaban benar
                
                let wrongAnswer = correctAnswer + offset;
                
                // Mencegah jawaban salah menjadi negatif jika jawaban benar positif
                if (wrongAnswer < 0 && correctAnswer >= 0) {
                    wrongAnswer = correctAnswer + Math.abs(offset) + 2;
                }

                // Pastikan jawaban salah tidak duplikat
                if (!options.includes(wrongAnswer)) {
                    options.push(wrongAnswer);
                }
            }

            // Acak urutan jawaban (Shuffle)
            options.sort(() => Math.random() - 0.5);

            // Render Tombol Jawaban
            optionsContainer.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'w-full py-4 bg-blue-50 hover:bg-blue-600 hover:text-white border-2 border-blue-200 hover:border-blue-600 text-blue-900 font-bold rounded-xl transition-all duration-200 text-xl transform hover:scale-[1.02] active:scale-95';
                btn.textContent = opt;
                btn.onclick = () => handleAnswer(opt);
                optionsContainer.appendChild(btn);
            });

            startTimer();
        }

        // Menangani Input Jawaban atau Timeout
        function handleAnswer(selectedAnswer) {
            if (isProcessing) return;
            isProcessing = true;
            clearInterval(timerInterval);

            // Cek benar, salah, atau timeout
            if (selectedAnswer === correctAnswer) {
                score += 10;
                feedbackEl.textContent = '🎉 Benar! +10';
                feedbackEl.className = 'mt-4 h-6 font-bold text-lg text-green-600';
                gameBoard.classList.add('flash-correct');
            } else {
                score -= 5;
                if (selectedAnswer === null) {
                    feedbackEl.textContent = `⏰ Waktu Habis! -5 (Jawaban: ${correctAnswer})`;
                } else {
                    feedbackEl.textContent = `❌ Salah! -5 (Jawaban: ${correctAnswer})`;
                }
                feedbackEl.className = 'mt-4 h-6 font-bold text-lg text-red-500';
                gameBoard.classList.add('flash-wrong');
            }

            // Update skor UI
            scoreEl.textContent = score;

            // Nonaktifkan tombol saat transisi
            const buttons = optionsContainer.querySelectorAll('button');
            buttons.forEach(btn => {
                btn.disabled = true;
                btn.classList.add('opacity-50', 'cursor-not-allowed');
                // Highlight jawaban yang benar
                if (parseInt(btn.textContent) === correctAnswer) {
                    btn.classList.remove('bg-blue-50', 'text-blue-900', 'border-blue-200');
                    btn.classList.add('bg-green-500', 'text-white', 'border-green-500', 'opacity-100');
                }
            });

            // Lanjut ke soal berikutnya setelah jeda 1.5 detik agar pemain bisa melihat feedback
            setTimeout(() => {
                generateQuestion();
            }, 1500);
        }

        // Mulai game pertama kali
        generateQuestion();
    </script>
</body>
</html>
