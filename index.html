<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Matematika Cepat</title>
    <!-- Menggunakan Tailwind CSS untuk styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animasi sederhana untuk efek notifikasi */
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop {
            animation: pop 0.3s ease-out forwards;
        }
        .fade-out {
            opacity: 0;
            transition: opacity 0.5s ease-out;
        }
    </style>
</head>
<body class="bg-indigo-50 min-h-screen flex flex-col items-center justify-center font-sans text-gray-800">

    <!-- Container Game -->
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden flex flex-col relative" style="min-height: 450px;">
        
        <!-- Header (Score & Timer) -->
        <div id="game-header" class="hidden bg-indigo-600 text-white p-4 flex justify-between items-center shadow-md z-10">
            <div class="text-lg font-bold">Skor: <span id="scoreDisplay">0</span></div>
            <div class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <div class="text-xl font-bold font-mono" id="timerDisplay">10s</div>
            </div>
        </div>

        <!-- Progress Bar Waktu -->
        <div id="time-bar-container" class="hidden w-full h-2 bg-gray-200">
            <div id="time-bar" class="h-full bg-red-500 transition-all duration-1000 ease-linear w-full"></div>
        </div>

        <!-- Layar Mulai -->
        <div id="start-screen" class="flex-1 flex flex-col items-center justify-center p-8 text-center h-full">
            <h1 class="text-3xl font-extrabold text-indigo-700 mb-4">Math Master</h1>
            <p class="text-gray-600 mb-8">Jawab soal matematika dalam 10 detik! <br> Benar: <strong>+10</strong> | Salah/Waktu Habis: <strong>-5</strong></p>
            <button onclick="startGame()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transform transition hover:scale-105 active:scale-95">
                Mulai Game
            </button>
        </div>

        <!-- Layar Permainan -->
        <div id="game-screen" class="hidden flex-1 flex flex-col items-center justify-center p-6 relative">
            <!-- Tempat Notifikasi -->
            <div id="notification" class="absolute top-4 left-0 w-full flex justify-center z-20 pointer-events-none opacity-0">
                <span id="notif-text" class="px-4 py-2 rounded-lg font-bold text-white shadow-md"></span>
            </div>

            <!-- Soal -->
            <h2 id="questionDisplay" class="text-5xl font-extrabold tracking-widest text-gray-800 mb-10 mt-6 text-center">
                -- + --
            </h2>

            <!-- Pilihan Jawaban -->
            <div id="options-container" class="w-full flex flex-col gap-4">
                <button onclick="checkAnswer(0)" id="btn-0" class="w-full bg-gray-100 hover:bg-indigo-100 text-xl font-bold py-4 rounded-xl border-2 border-gray-200 hover:border-indigo-400 transition-colors shadow-sm text-gray-700"></button>
                <button onclick="checkAnswer(1)" id="btn-1" class="w-full bg-gray-100 hover:bg-indigo-100 text-xl font-bold py-4 rounded-xl border-2 border-gray-200 hover:border-indigo-400 transition-colors shadow-sm text-gray-700"></button>
                <button onclick="checkAnswer(2)" id="btn-2" class="w-full bg-gray-100 hover:bg-indigo-100 text-xl font-bold py-4 rounded-xl border-2 border-gray-200 hover:border-indigo-400 transition-colors shadow-sm text-gray-700"></button>
            </div>
        </div>

    </div>

    <!-- Footer -->
    <footer class="mt-8 text-center text-gray-500 font-medium">
        Game dirancang oleh Aldi
    </footer>

    <!-- Logika Javascript -->
    <script>
        // Variabel Status Game
        let score = 0;
        let timeLeft = 10;
        let timerInterval;
        let currentCorrectAnswer = 0;
        let isWaitingNext = false;

        // Elemen DOM
        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const gameHeader = document.getElementById('game-header');
        const timeBarContainer = document.getElementById('time-bar-container');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const timerDisplay = document.getElementById('timerDisplay');
        const timeBar = document.getElementById('time-bar');
        const questionDisplay = document.getElementById('questionDisplay');
        const btnOptions = [
            document.getElementById('btn-0'),
            document.getElementById('btn-1'),
            document.getElementById('btn-2')
        ];
        const notification = document.getElementById('notification');
        const notifText = document.getElementById('notif-text');

        // Memulai Game
        function startGame() {
            score = 0;
            updateScoreDisplay();
            startScreen.classList.add('hidden');
            gameHeader.classList.remove('hidden');
            timeBarContainer.classList.remove('hidden');
            gameScreen.classList.remove('hidden');
            gameScreen.classList.add('flex');
            
            nextQuestion();
        }

        // Generate Soal Baru
        function nextQuestion() {
            isWaitingNext = false;
            resetTimer();
            generateMathProblem();
        }

        // Logika Pembuatan Soal Matematika
        function generateMathProblem() {
            const operations = ['+', '-', '×', '÷'];
            const op = operations[Math.floor(Math.random() * operations.length)];
            let num1, num2, correctAns;

            if (op === '+') {
                num1 = Math.floor(Math.random() * 100);
                num2 = Math.floor(Math.random() * 100);
                correctAns = num1 + num2;
            } else if (op === '-') {
                num1 = Math.floor(Math.random() * 100);
                num2 = Math.floor(Math.random() * 100);
                // Agar hasil tidak negatif untuk level dasar, tukar jika num1 < num2
                if (num1 < num2) [num1, num2] = [num2, num1];
                correctAns = num1 - num2;
            } else if (op === '×') {
                // Agar tidak terlalu sulit, angka maksimal dibatasi untuk perkalian meskipun rules 0-99
                num1 = Math.floor(Math.random() * 20); 
                num2 = Math.floor(Math.random() * 20);
                correctAns = num1 * num2;
            } else if (op === '÷') {
                // Logika pembagian agar bulat dan bilangan asal max 99
                num2 = Math.floor(Math.random() * 99) + 1; // 1-99 (hindari bagi 0)
                const maxCorrect = Math.floor(99 / num2); // pastikan num1 <= 99
                correctAns = Math.floor(Math.random() * (maxCorrect + 1));
                num1 = num2 * correctAns;
            }

            currentCorrectAnswer = correctAns;
            questionDisplay.innerText = `${num1} ${op} ${num2}`;

            generateOptions(correctAns);
        }

        // Generate Pilihan Jawaban Acak (tapi masuk akal)
        function generateOptions(correct) {
            let options = [correct];
            
            // Generate 2 jawaban salah yang berdekatan nilainya
            while (options.length < 3) {
                // Variasi rentang acak sekitar -10 hingga +10 dari jawaban asli
                let offset = Math.floor(Math.random() * 21) - 10; 
                let wrongAnswer = correct + offset;
                
                // Pastikan jawaban salah tidak sama dengan jawaban benar, tidak ada duplikat, 
                // dan tidak negatif jika jawaban benar >= 0
                if (wrongAnswer !== correct && !options.includes(wrongAnswer) && (correct >= 0 ? wrongAnswer >= 0 : true)) {
                    options.push(wrongAnswer);
                }
            }

            // Acak urutan array
            options.sort(() => Math.random() - 0.5);

            // Tampilkan ke tombol
            options.forEach((opt, index) => {
                btnOptions[index].innerText = opt;
                btnOptions[index].value = opt;
                // Reset styling tombol
                btnOptions[index].className = "w-full bg-gray-100 hover:bg-indigo-100 text-xl font-bold py-4 rounded-xl border-2 border-gray-200 hover:border-indigo-400 transition-colors shadow-sm text-gray-700";
                btnOptions[index].disabled = false;
            });
        }

        // Cek Jawaban User
        function checkAnswer(btnIndex) {
            if (isWaitingNext) return; // Mencegah klik ganda
            
            clearInterval(timerInterval);
            isWaitingNext = true;
            
            const selectedBtn = btnOptions[btnIndex];
            const selectedAnswer = parseInt(selectedBtn.value);

            // Disable semua tombol sementara mengevaluasi
            btnOptions.forEach(btn => btn.disabled = true);

            if (selectedAnswer === currentCorrectAnswer) {
                // Benar
                score += 10;
                selectedBtn.classList.replace('bg-gray-100', 'bg-green-500');
                selectedBtn.classList.replace('text-gray-700', 'text-white');
                showNotification("Benar! +10", "success");
            } else {
                // Salah
                score -= 5;
                selectedBtn.classList.replace('bg-gray-100', 'bg-red-500');
                selectedBtn.classList.replace('text-gray-700', 'text-white');
                
                // Highlight yang benar
                btnOptions.forEach(btn => {
                    if (parseInt(btn.value) === currentCorrectAnswer) {
                        btn.classList.replace('bg-gray-100', 'bg-green-400');
                        btn.classList.replace('text-gray-700', 'text-white');
                        btn.classList.add('border-green-500');
                    }
                });
                
                showNotification("Salah! -5", "error");
            }

            updateScoreDisplay();

            // Jeda 1 detik sebelum soal berikutnya
            setTimeout(() => {
                nextQuestion();
            }, 1000);
        }

        // Logika Waktu (Timer)
        function resetTimer() {
            clearInterval(timerInterval);
            timeLeft = 10; // 10 Detik
            timerDisplay.innerText = `${timeLeft}s`;
            timerDisplay.classList.remove('text-red-500');
            timeBar.style.width = '100%';
            timeBar.classList.replace('bg-red-600', 'bg-red-500');

            timerInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = `${timeLeft}s`;
                
                // Update Progress bar width
                const percentage = (timeLeft / 10) * 100;
                timeBar.style.width = `${percentage}%`;

                if (timeLeft <= 3) {
                    timerDisplay.classList.add('text-red-500');
                    timeBar.classList.replace('bg-red-500', 'bg-red-600');
                }

                if (timeLeft <= 0) {
                    handleTimeout();
                }
            }, 1000);
        }

        // Ketika Waktu Habis
        function handleTimeout() {
            clearInterval(timerInterval);
            if (isWaitingNext) return;
            isWaitingNext = true;

            score -= 5;
            updateScoreDisplay();
            showNotification("Waktu Habis! -5", "timeout");

            btnOptions.forEach(btn => {
                btn.disabled = true;
                if (parseInt(btn.value) === currentCorrectAnswer) {
                    btn.classList.replace('bg-gray-100', 'bg-green-400');
                    btn.classList.replace('text-gray-700', 'text-white');
                }
            });

            setTimeout(() => {
                nextQuestion();
            }, 1200);
        }

        // Update Skor di Layar
        function updateScoreDisplay() {
            scoreDisplay.innerText = score;
        }

        // Memunculkan Notifikasi Flash Sederhana
        function showNotification(message, type) {
            notification.classList.remove('opacity-0', 'fade-out');
            notifText.innerText = message;
            
            // Set warna badge
            notifText.className = "px-4 py-2 rounded-lg font-bold text-white shadow-md animate-pop";
            if (type === "success") {
                notifText.classList.add('bg-green-500');
            } else if (type === "error") {
                notifText.classList.add('bg-red-500');
            } else {
                notifText.classList.add('bg-orange-500');
            }

            notification.classList.add('opacity-100');

            // Fade out
            setTimeout(() => {
                notification.classList.remove('opacity-100');
                notification.classList.add('fade-out');
            }, 800);
        }
    </script>
</body>
</html>
